<!-- This is all AI  -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Guess Game</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="game-container">

<h1>Word Guess Game</h1>

<div id="difficulty-section">
<h2>Select Difficulty</h2>

<button id="easyBtn">Easy</button>
<button id="mediumBtn">Medium</button>
<button id="hardBtn">Hard</button>
</div>

<div class="health-section">
<img id="healthImage" src="images/health6.png" alt="Player Health">
</div>

<div id="wordDisplay">
_ _ _ _ _
</div>

<div class="guess-section">

<input
type="text"
id="guessInput"
maxlength="1"
placeholder="Enter letter"
/>

<button id="guessBtn">Guess</button>

</div>

<div id="guessInfo">
<p>Wrong Guesses: <span id="wrongCount">0</span></p>
<p>Guesses Remaining: <span id="remainingGuesses">0</span></p>
</div>

<div id="usedLettersSection">
<h3>Used Letters</h3>

<div id="usedLetters">
None
</div>
</div>

<div id="gameMessage">
</div>

<div class="restart-section">
<button id="restartBtn">Restart Game</button>
</div>

</div>

</body>
</html>
